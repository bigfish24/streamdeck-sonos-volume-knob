<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sonos Volume Knob</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: "Segoe UI", -apple-system, sans-serif;
      font-size: 13px;
      background: #2d2d2d;
      color: #d8d8d8;
      margin: 0;
      padding: 12px;
    }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .label { flex: 0 0 74px; text-align: right; color: #969696; }
    select, input[type="number"] {
      flex: 1 1 auto;
      background: #3d3d3d;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 5px 6px;
      font-size: 13px;
      min-width: 0;
    }
    input[type="number"] { max-width: 70px; }
    button {
      background: #464646;
      color: #fff;
      border: 1px solid #5f5f5f;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #545454; }
    .status { color: #8a8a8a; font-size: 11px; margin-top: 4px; min-height: 14px; }
    .hint { color: #6f6f6f; font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="label">Speaker</div>
    <select id="speaker"><option value="">— scanning… —</option></select>
  </div>
  <div class="row">
    <div class="label"></div>
    <button id="rescan">Rescan network</button>
  </div>
  <div class="row">
    <div class="label">Step</div>
    <input type="number" id="step" min="1" max="20" value="2" />
    <span class="hint">% per click</span>
  </div>
  <div class="row">
    <div class="label"></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    let websocket = null, piUUID = null, actionUUID = null;
    let settings = {};

    function setStatus(t) { document.getElementById("status").textContent = t || ""; }

    // Stream Deck calls this global once the PI is loaded.
    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      piUUID = inUUID;
      try {
        const actionInfo = JSON.parse(inActionInfo);
        actionUUID = actionInfo.action;
        settings = (actionInfo.payload && actionInfo.payload.settings) || {};
      } catch (e) {}

      websocket = new WebSocket("ws://127.0.0.1:" + inPort);
      websocket.onopen = function () {
        websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
        applySettings();
        if (settings.name) setStatus("Current: " + settings.name);
        requestDevices();
      };
      websocket.onmessage = function (e) {
        let msg;
        try { msg = JSON.parse(e.data); } catch (err) { return; }
        if (msg.event === "sendToPropertyInspector") {
          const p = msg.payload || {};
          if (p.command === "devices") populateRooms(p.rooms || []);
        } else if (msg.event === "didReceiveSettings") {
          settings = (msg.payload && msg.payload.settings) || {};
          applySettings();
        }
      };
    }
    // Stream Deck looks for this exact global name.
    window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;

    function requestDevices() {
      if (!websocket) return;
      setStatus("Scanning network…");
      websocket.send(JSON.stringify({
        event: "sendToPlugin",
        action: actionUUID,
        context: piUUID,
        payload: { command: "getDevices" }
      }));
    }

    function populateRooms(rooms) {
      const sel = document.getElementById("speaker");
      sel.innerHTML = "";
      if (!rooms.length) {
        sel.innerHTML = '<option value="">No speakers found</option>';
        setStatus("No Sonos speakers found — check network, then Rescan.");
        return;
      }
      const none = document.createElement("option");
      none.value = ""; none.textContent = "Select a speaker…";
      sel.appendChild(none);
      for (const r of rooms) {
        const o = document.createElement("option");
        o.value = r.uuid;
        o.textContent = r.name;
        o.dataset.host = r.host;
        o.dataset.name = r.name;
        if (settings.uuid === r.uuid || (!settings.uuid && settings.host === r.host)) o.selected = true;
        sel.appendChild(o);
      }
      setStatus(rooms.length + " speaker(s) found.");
    }

    function saveSettings() {
      if (!websocket) return;
      websocket.send(JSON.stringify({ event: "setSettings", context: piUUID, payload: settings }));
    }

    function applySettings() {
      document.getElementById("step").value = settings.step || 2;
    }

    document.getElementById("speaker").addEventListener("change", function () {
      const sel = this;
      const opt = sel.options[sel.selectedIndex];
      if (!opt || !opt.value) return;
      settings.uuid = opt.value;
      settings.host = opt.dataset.host;
      settings.name = opt.dataset.name;
      saveSettings();
      setStatus("Selected: " + settings.name);
    });

    document.getElementById("step").addEventListener("change", function () {
      let v = parseInt(this.value, 10);
      if (!Number.isFinite(v)) v = 2;
      v = Math.max(1, Math.min(20, v));
      this.value = v;
      settings.step = v;
      saveSettings();
    });

    document.getElementById("rescan").addEventListener("click", requestDevices);
  </script>
</body>
</html>
